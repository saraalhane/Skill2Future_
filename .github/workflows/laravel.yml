name: Skill2Future CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du code
      - uses: actions/checkout@v4

      # 2. Configuration Environnement PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_sqlite, gd, zip

      # 3. Configuration Environnement Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. Backend : Installation dépendances
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: composer install --prefer-dist --no-interaction

      # 5. Backend : Préparation environnement
      - name: Copy .env
        working-directory: ./backend
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      # 6. Frontend : Installation et Build
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Frontend Assets
        working-directory: ./frontend
        run: npm run build

      # 7. Exécution des Tests
      - name: Execute tests with coverage
        working-directory: ./backend
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: |
          mkdir -p build/logs
          php artisan test --coverage-clover build/logs/clover.xml
